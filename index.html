<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earning Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border-radius: 20px; padding: 25px; border: 1px solid #334155; }
        .btn-glow { transition: 0.3s; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); transform: translateY(-2px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Earning Dashboard
            </h1>
            <p class="text-gray-400 text-sm mt-2">User ID: {{ user[0] }}</p>
        </div>

        <div class="card mb-6 text-center">
            <p class="text-gray-400 uppercase tracking-widest text-xs font-bold mb-1">Available Balance</p>
            <h2 class="text-5xl font-black text-white mb-2">{{ user[1] }} <span class="text-xl text-emerald-400">Coins</span></h2>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="card bg-blue-600 hover:bg-blue-500 py-4 font-bold btn-glow">Withdraw</button>
            <button class="card bg-slate-800 hover:bg-slate-700 py-4 font-bold border-gray-600">History</button>
        </div>

        <div class="card bg-slate-900/50">
            <h3 class="text-sm font-semibold mb-3 text-blue-300">Invite & Earn 5 Coins</h3>
            <div class="relative">
                <input type="text" readonly value="https://t.me/{{ bot_username }}?start={{ user[0] }}" 
                       class="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-xs text-emerald-400 outline-none">
            </div>
            <p class="text-[10px] mt-3 text-gray-500 italic">*Share your link to grow your wallet!</p>
        </div>
    </div>
</body>
</html>
